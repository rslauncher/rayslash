[workspace]
members = [
    "crates/rayslash-core",
    "crates/rayslash-ui",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/rayan/rayslash"

[workspace.dependencies]
dirs = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
slint = "1.17.0"
slint-build = "1.17.0"
toml = "1.1.2"
