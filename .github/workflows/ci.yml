name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release_assets:
        description: Attach verified Fedora package sets to the matching app release
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils libfontconfig1-dev
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --workspace
      - name: Validate packaging metadata
        run: packaging/validate-metadata.sh

  fedora-rpm-offline:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64
            runner: ubuntu-latest
          - architecture: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: fedora:44
    steps:
      - name: Install packaging tools
        run: dnf install -y appstream cargo createrepo_c curl desktop-file-utils fontconfig-devel gcc git rpm-build rpmlint rust xz
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Trust the container workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Prepare source and vendor archives
        run: packaging/fedora/prepare-sources.sh "$RUNNER_TEMP/sources" "$GITHUB_SHA"
      - name: Build source RPM
        run: |
          mkdir -p "$RUNNER_TEMP/rpmbuild"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          cp "$RUNNER_TEMP/sources"/* "$RUNNER_TEMP/rpmbuild/SOURCES/"
          cp packaging/fedora/rayslash.spec "$RUNNER_TEMP/rpmbuild/SPECS/"
          rpmbuild -bs \
            --define "_topdir $RUNNER_TEMP/rpmbuild" \
            "$RUNNER_TEMP/rpmbuild/SPECS/rayslash.spec"
      - name: Rebuild without Cargo network access
        env:
          CARGO_NET_OFFLINE: "true"
        run: |
          mkdir -p "$RUNNER_TEMP/rebuild"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          rpmbuild --rebuild \
            --define "_topdir $RUNNER_TEMP/rebuild" \
            "$RUNNER_TEMP/rpmbuild/SRPMS/rayslash-0.1.1-1.fc44.src.rpm"
      - name: Preserve RPMs for release validation
        run: |
          mkdir -p "$GITHUB_WORKSPACE/fedora-package-set"
          find "$RUNNER_TEMP/rebuild/RPMS" -type f -name '*.rpm' \
            -exec cp -v {} "$GITHUB_WORKSPACE/fedora-package-set/" \;
          if [[ "${{ matrix.architecture }}" == x86_64 ]]; then
            cp -v "$RUNNER_TEMP/rpmbuild/SRPMS/"*.src.rpm "$GITHUB_WORKSPACE/fedora-package-set/"
          fi
          packaging/fedora/fetch-host-rpm.sh "${{ matrix.architecture }}" \
            "$GITHUB_WORKSPACE/fedora-package-set"
          for package in "$GITHUB_WORKSPACE/fedora-package-set"/rayslash-*.rpm; do
            sidecar="$package.sha256"
            [[ -f "$sidecar" ]] || (cd "$(dirname "$package")" && sha256sum "$(basename "$package")" > "$(basename "$sidecar")")
          done
      - name: Validate complete Fedora package set
        run: |
          cd fedora-package-set
          sha256sum --check --strict *.rpm.sha256
          rpm -Kv *.rpm
          rpmlint *.rpm
          app_rpm=$(find . -maxdepth 1 -type f -name 'rayslash-0.1.1-1.fc44.*.rpm' ! -name '*.src.rpm' -print -quit)
          host_rpm=$(find . -maxdepth 1 -type f -name 'rayslash-module-host-*.rpm' -print -quit)
          test -n "$app_rpm"
          test -n "$host_rpm"
          if rpm -qpl "$app_rpm" | grep -E 'module\.(wasm|toml)|rayslash-module-host'; then
            echo "the app RPM unexpectedly bundles module or host files" >&2
            exit 1
          fi
          mkdir dnf-repo
          cp "$app_rpm" "$host_rpm" dnf-repo/
          createrepo_c dnf-repo >/dev/null
          dnf --disablerepo='*' \
            --repofrompath=rayslash-local,"file://$PWD/dnf-repo" \
            --setopt=rayslash-local.gpgcheck=0 --refresh \
            install rayslash --assumeno | tee dnf-transaction.txt
          grep -F rayslash-module-host dnf-transaction.txt
          grep -F rayslash dnf-transaction.txt
          expected=4
          [[ "${{ matrix.architecture }}" == x86_64 ]] && expected=5
          test "$(find . -maxdepth 1 -type f -name '*.rpm' | wc -l)" -eq "$expected"
          test "$(find . -maxdepth 1 -type f -name '*.rpm.sha256' | wc -l)" -eq "$expected"
      - name: Upload complete Fedora package set
        uses: actions/upload-artifact@v7
        with:
          name: fedora-44-${{ matrix.architecture }}-package-set
          path: |
            fedora-package-set/*.rpm
            fedora-package-set/*.rpm.sha256
          if-no-files-found: error
          retention-days: 14

  publish-fedora-release-assets:
    if: ${{ inputs.publish_release_assets }}
    needs: fedora-rpm-offline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: fedora-44-*-package-set
          path: fedora-release-assets
          merge-multiple: true
      - name: Verify and publish Fedora package sets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd fedora-release-assets
          sha256sum --check --strict *.rpm.sha256
          gh release view v0.1.1 --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload v0.1.1 ./* --repo "$GITHUB_REPOSITORY" --clobber
