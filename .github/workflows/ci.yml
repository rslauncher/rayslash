name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils libfontconfig1-dev
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --workspace
      - name: Validate packaging metadata
        run: packaging/validate-metadata.sh
