name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils libfontconfig1-dev
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --workspace
      - name: Validate packaging metadata
        run: packaging/validate-metadata.sh

  fedora-rpm-offline:
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Install packaging tools
        run: dnf install -y appstream cargo desktop-file-utils fontconfig-devel gcc git rpm-build rust xz
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trust the container workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Prepare source and vendor archives
        run: packaging/fedora/prepare-sources.sh "$RUNNER_TEMP/sources" "$GITHUB_SHA"
      - name: Build source RPM
        run: |
          mkdir -p "$RUNNER_TEMP/rpmbuild"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          cp "$RUNNER_TEMP/sources"/* "$RUNNER_TEMP/rpmbuild/SOURCES/"
          cp packaging/fedora/rayslash.spec "$RUNNER_TEMP/rpmbuild/SPECS/"
          rpmbuild -bs \
            --define "_topdir $RUNNER_TEMP/rpmbuild" \
            "$RUNNER_TEMP/rpmbuild/SPECS/rayslash.spec"
      - name: Rebuild without Cargo network access
        env:
          CARGO_NET_OFFLINE: "true"
        run: |
          mkdir -p "$RUNNER_TEMP/rebuild"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          rpmbuild --rebuild \
            --define "_topdir $RUNNER_TEMP/rebuild" \
            "$RUNNER_TEMP/rpmbuild/SRPMS/rayslash-0.1.0-2.fc44.src.rpm"
      - name: Preserve RPMs for release validation
        uses: actions/upload-artifact@v4
        with:
          name: fedora-44-rpms
          path: |
            ${{ runner.temp }}/rpmbuild/SRPMS/*.src.rpm
            ${{ runner.temp }}/rebuild/RPMS/**/*.rpm
          if-no-files-found: error
          retention-days: 7
